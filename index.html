    <!-- Application Structure Plan: The SPA is structured as a dual-industry executive dashboard. A top-level toggle allows users to instantly switch the entire dataset between the "Livestream Studio" and "Co-working Space" industries. The main layout uses a sidebar for logical navigation through the consulting framework (Overview, Competitors, Customers, Strategy, Go-to-Market). This chunking strategy prevents cognitive overload. Each section features a clear introductory paragraph explaining its purpose, followed by data visualizations contained within strictly controlled, responsive layout grids to ensure perfect readability on all devices. -->
    <!-- Visualization & Content Choices: 
         1. Market Growth: Line Chart (Chart.js) to show multi-year trends.
         2. Unit Economics: Doughnut Chart (Chart.js) for cost structure proportion.
         3. Competitor Landscape: HTML Data Tables with JS sorting/filtering (conceptualized via clean grid) for detailed metric comparison.
         4. Customer Profiles & Funnel: Styled HTML CSS Grid cards and stacked blocks for readability, avoiding complex external libraries.
         Interaction: Industry toggle dynamically rewrites DOM and re-initializes charts. Tab switching updates main content view without page reload.
         Justification: This approach ensures zero reliance on SVG/Mermaid, maximizes performance, and keeps the C-level user focused on actionable data. 
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

                    ],
                    economicsData: { labels: ['Tiền thuê tòa nhà', 'Khấu hao Nội thất', 'Vận hành (Điện, NV)', 'Sales & MKT', 'Lợi nhuận gộp'], values: [50, 15, 15, 10, 10] },
                    economicsContext: "Biên lợi nhuận gộp mỏng (~10%) do chi phí mặt bằng (Master lease) chiếm tới 50%. Để scale up, cần phát triển các dịch vụ add-on (pháp lý, sự kiện) có biên lợi nhuận cao hơn."
                },
                gtm: {
                    title: "Chiến lược Go-to-Market",
                    intro: "Phương pháp tiếp cận B2B. Tập trung vào việc tạo ra Leads chất lượng thông qua sự kiện cộng đồng và xây dựng mạng lưới Broker Bất động sản.",
                    funnel: [
                        { stage: "Awareness", action: "Tổ chức chuỗi Workshop miễn phí về Quản trị/Công nghệ tại không gian.", kpi: "Event Attendees" },
                        { stage: "Lead Gen", action: "Landing page tối ưu SEO (Keyword: 'Thuê văn phòng ảo quận 1').", kpi: "MQLs" },
                        { stage: "Conversion", action: "Site-tour tham quan trực tiếp kèm 1 ngày Free Trial.", kpi: "Tour-to-Close Ratio" },
                        { stage: "Retention", action: "App nội bộ cộng đồng, tổ chức Happy Hour thứ 6 hàng tuần.", kpi: "Churn Rate (<5%)" }
                    ],
                    moat: ["Dịch vụ kế toán & Đăng ký kinh doanh trọn gói", "Phòng ngủ trưa (Nap pod) & Phòng tắm", "Dịch vụ IT Support on-site cho doanh nghiệp"]
                }
            }
        };

        const navItems = [
            { id: 'overview', icon: '📊', label: '1. Market Landscape' },
            { id: 'competitors', icon: '⚔️', label: '2. Competitor Analysis' },
            { id: 'customers', icon: '👥', label: '3. Customer Insights' },
            { id: 'strategy', icon: '🧠', label: '4. Business Strategy' },
            { id: 'gtm', icon: '🚀', label: '5. Go-to-Market' }
        ];

        let currentInd = 'livestream';
        let currentTab = 'overview';
        let activeChartObj = null;

        document.addEventListener('DOMContentLoaded', () => {
            setupEvents();
            renderNav();
            renderContent();
        });

        function setupEvents() {
            document.getElementById('btn-live').addEventListener('click', () => {
                if(currentInd !== 'livestream') { currentInd = 'livestream'; updateTheme(); renderContent(); }
            });
            document.getElementById('btn-cowork').addEventListener('click', () => {
                if(currentInd !== 'cowork') { currentInd = 'cowork'; updateTheme(); renderContent(); }
            });
        }

        function updateTheme() {
            const body = document.getElementById('app');
            const bLive = document.getElementById('btn-live');
            const bCowork = document.getElementById('btn-cowork');

            if (currentInd === 'livestream') {
                body.className = 'h-screen flex flex-col overflow-hidden theme-live';
                bLive.className = 'px-4 py-1.5 text-sm font-semibold rounded-md transition-all duration-300 bg-white shadow text-slate-800';
                bCowork.className = 'px-4 py-1.5 text-sm font-semibold rounded-md transition-all duration-300 text-slate-500 hover:text-slate-800';
            } else {
                body.className = 'h-screen flex flex-col overflow-hidden theme-cowork';
                bCowork.className = 'px-4 py-1.5 text-sm font-semibold rounded-md transition-all duration-300 bg-white shadow text-slate-800';
                bLive.className = 'px-4 py-1.5 text-sm font-semibold rounded-md transition-all duration-300 text-slate-500 hover:text-slate-800';
            }
            renderNav();
        }

        function renderNav() {
            const side = document.getElementById('sidebar');
            const mob = document.getElementById('mobile-nav');
            side.innerHTML = ''; mob.innerHTML = '';

            navItems.forEach(item => {
                const isAct = item.id === currentTab;
                
                const btnSide = document.createElement('button');
                btnSide.className = `w-full flex items-center gap-3 px-6 py-4 text-sm transition-colors text-left ${isAct ? 'active-tab' : 'text-slate-600 hover:bg-slate-50'}`;
                btnSide.innerHTML = `<span class="text-lg">${item.icon}</span> <span>${item.label}</span>`;
                btnSide.onclick = () => { currentTab = item.id; renderNav(); renderContent(); };
                side.appendChild(btnSide);

                const btnMob = document.createElement('button');
                btnMob.className = `whitespace-nowrap px-4 py-2 text-sm font-medium transition-colors border-b-2 ${isAct ? 'border-primary text-primary' : 'border-transparent text-slate-500'}`;
                btnMob.innerText = item.label;
                btnMob.onclick = () => { currentTab = item.id; renderNav(); renderContent(); };
                mob.appendChild(btnMob);
            });
        }

        function renderContent() {
            const main = document.getElementById('main-content');
            const data = database[currentInd][currentTab];
            const meta = database[currentInd];
            
            if(activeChartObj) { activeChartObj.destroy(); activeChartObj = null; }
            main.scrollTop = 0;

            let html = `
                <div class="mb-8">
                    <span class="inline-block px-3 py-1 rounded bg-primary-light text-primary text-xs font-bold tracking-widest uppercase mb-3 border border-primary/20">${meta.industryName}</span>
                    <h1 class="text-3xl font-bold text-slate-900 mb-3">${data.title}</h1>
                    <p class="text-slate-600 leading-relaxed max-w-4xl text-lg">${data.intro}</p>
                </div>
            `;

            if (currentTab === 'overview') {
                html += `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="glass-panel p-6 rounded-xl border-t-4 border-t-primary">
                            <p class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Market Size</p>
                            <p class="text-2xl font-bold text-slate-800">${data.size}</p>
                        </div>
                        <div class="glass-panel p-6 rounded-xl border-t-4 border-t-primary">
                            <p class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Growth Rate</p>
                            <p class="text-3xl font-extrabold text-primary">${data.growth}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="glass-panel p-6 rounded-xl">
                            <h3 class="font-bold text-slate-800 mb-2">Dự phóng Thị trường</h3>
                            <p class="text-sm text-slate-500 mb-4">${data.chartContext}</p>
                            <div class="chart-container"><canvas id="mainChart"></canvas></div>
                        </div>
                        <div class="space-y-6">
                            <div class="glass-panel p-6 rounded-xl">
                                <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2"><span>📈</span> Market Drivers</h3>
                                <ul class="list-disc pl-5 text-sm text-slate-700 space-y-2">
                                    ${data.drivers.map(d => `<li>${d}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="glass-panel p-6 rounded-xl">
                                <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2"><span>🚧</span> Market Barriers</h3>
                                <ul class="list-disc pl-5 text-sm text-slate-700 space-y-2">
                                    ${data.barriers.map(d => `<li>${d}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="glass-panel p-6 rounded-xl bg-slate-800 text-white border-none">
                        <h3 class="font-bold mb-4">Phân tích PESTEL (Key Highlights)</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${data.pestel.map(p => `
                                <div class="bg-slate-700/50 p-4 rounded-lg">
                                    <span class="text-xl font-black text-primary mb-2 block">${p.letter}</span>
                                    <p class="text-sm text-slate-300 leading-relaxed">${p.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } 
            else if (currentTab === 'competitors') {
                html += `
                    <div class="glass-panel p-6 rounded-xl mb-8 border-l-4 border-l-primary bg-primary-light/30">
                        <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-2">Market Gap & Opportunity</h3>
                        <p class="text-slate-700">${data.gap}</p>
                    </div>

                    <div class="glass-panel rounded-xl overflow-hidden">
                        <div class="p-5 bg-slate-50 border-b border-slate-200">
                            <h3 class="font-bold text-slate-800">Bảng So sánh Top 10 Đối thủ (TP.HCM)</h3>
                            <p class="text-sm text-slate-500 mt-1">Dữ liệu phân tích mô hình định giá và giá trị cốt lõi.</p>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="text-xs uppercase bg-slate-100 text-slate-600 font-bold">
                                    <tr>
                                        <th class="px-6 py-4">Company</th>
                                        <th class="px-6 py-4">Pricing</th>
                                        <th class="px-6 py-4">Core Service</th>
                                        <th class="px-6 py-4">Unique Selling Proposition</th>
                                        <th class="px-6 py-4">Model</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${data.list.map(c => `
                                        <tr class="hover:bg-slate-50 transition-colors">
                                            <td class="px-6 py-4 font-bold text-slate-800">${c.name}</td>
                                            <td class="px-6 py-4"><span class="bg-slate-200 text-slate-700 px-2 py-1 rounded text-xs font-semibold">${c.price}</span></td>
                                            <td class="px-6 py-4 text-slate-600">${c.core}</td>
                                            <td class="px-6 py-4 text-primary font-medium">${c.usp}</td>
                                            <td class="px-6 py-4 text-slate-500">${c.model}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            else if (currentTab === 'customers') {
                html += `
                    <div class="glass-panel p-6 rounded-xl mb-8 bg-slate-800 text-white border-none">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Critical Behavioral Insight</h3>
                        <p class="text-xl font-medium">"${data.insight}"</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${data.personas.map(p => `
                            <div class="glass-panel rounded-xl p-6 flex flex-col relative overflow-hidden group hover:shadow-lg transition-all">
                                <div class="absolute top-0 left-0 w-full h-1 bg-primary opacity-50 group-hover:opacity-100"></div>
                                <h4 class="font-bold text-lg text-slate-800 mb-4">${p.name}</h4>
                                <div class="space-y-4 flex-1">
                                    <div>
                                        <span class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Jobs to be Done</span>
                                        <p class="text-sm text-slate-700 bg-slate-50 p-2 rounded border border-slate-100">${p.jtbd}</p>
                                    </div>
                                    <div>
                                        <span class="text-[10px] font-bold text-red-500 uppercase block mb-1">Pain Points</span>
                                        <p class="text-sm text-slate-700 bg-red-50 p-2 rounded border border-red-100">${p.pain}</p>
                                    </div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-slate-100">
                                    <span class="text-[10px] font-bold text-emerald-600 uppercase block mb-1">Buying Trigger</span>
                                    <p class="text-sm font-medium text-slate-800">${p.trigger}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            else if (currentTab === 'strategy') {
                html += `
                    <div class="glass-panel p-6 rounded-xl mb-8 border-l-4 border-l-primary bg-primary-light/30">
                        <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-2">Value Proposition Shift</h3>
                        <p class="text-slate-800 font-medium">${data.proposition}</p>
                    </div>

                    <h3 class="font-bold text-slate-800 mb-4 text-xl">Đề xuất Gói Dịch vụ (Pricing Tiers)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        ${data.tiers.map((t, i) => `
                            <div class="glass-panel rounded-xl p-6 flex flex-col ${i===1 ? 'border-2 border-primary shadow-md transform md:-translate-y-2' : ''}">
                                ${i===1 ? '<span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 uppercase">Core Product</span>' : ''}
                                <h4 class="font-bold text-slate-800 text-lg text-center mb-2">${t.name}</h4>
                                <div class="text-center mb-4"><span class="text-3xl font-black text-slate-900">${t.price}</span></div>
                                <p class="text-sm text-slate-600 text-center mb-6 bg-slate-50 p-3 rounded flex-1">${t.desc}</p>
                                <div class="text-center pt-4 border-t border-slate-100">
                                    <span class="text-xs text-slate-500 uppercase block mb-1">Target</span>
                                    <span class="font-semibold text-slate-800 text-sm">${t.target}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="glass-panel p-6 rounded-xl">
                        <h3 class="font-bold text-slate-800 mb-2 text-xl">Unit Economics (Cấu trúc chi phí)</h3>
                        <p class="text-sm text-slate-500 mb-6">${data.economicsContext}</p>
                        <div class="chart-container"><canvas id="mainChart"></canvas></div>
                    </div>
                `;
            }
            else if (currentTab === 'gtm') {
                html += `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="glass-panel p-6 rounded-xl">
                            <h3 class="font-bold text-slate-800 mb-6 text-xl">Marketing Funnel</h3>
                            <div class="space-y-4">
                                ${data.funnel.map((f, i) => {
                                    const w = ['w-full', 'w-[90%]', 'w-[80%]', 'w-[70%]'];
                                    const op = ['bg-primary/10', 'bg-primary/30', 'bg-primary/60', 'bg-primary text-white'];
                                    const textCol = i > 1 ? 'text-white' : 'text-slate-800';
                                    const subCol = i > 1 ? 'text-white/80' : 'text-slate-500';
                                    return `
                                    <div class="${w[i]} mx-auto ${op[i]} rounded-lg p-4 flex flex-col items-center justify-center text-center transition-transform hover:scale-105">
                                        <span class="text-[10px] font-black uppercase tracking-widest ${subCol} mb-1 bg-black/10 px-2 py-0.5 rounded">${f.stage}</span>
                                        <p class="text-sm font-semibold ${textCol} mb-2">${f.action}</p>
                                        <span class="text-xs font-bold ${subCol}">KPI: ${f.kpi}</span>
                                    </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="glass-panel p-6 rounded-xl border-l-4 border-l-primary">
                                <h3 class="font-bold text-slate-800 mb-4 text-xl">Value-Added Services (Moat)</h3>
                                <p class="text-sm text-slate-600 mb-4">Các dịch vụ gia tăng nhằm tăng AOV (Giá trị đơn) và tạo rào cản rời bỏ:</p>
                                <ul class="space-y-3">
                                    ${data.moat.map(m => `
                                        <li class="flex items-start gap-3 bg-slate-50 p-3 rounded border border-slate-100">
                                            <span class="text-primary mt-0.5">✦</span>
                                            <span class="text-sm font-medium text-slate-800">${m}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            
                            <div class="glass-panel p-6 rounded-xl bg-slate-800 text-white border-none">
                                <h3 class="font-bold mb-2 text-xl">Execution Note</h3>
                                <p class="text-sm text-slate-300 leading-relaxed">Chiến lược GTM cần tập trung vào giáo dục thị trường trong 3 tháng đầu. Đừng bán không gian, hãy bán "sự an tâm" và "tăng trưởng doanh thu" cho khách hàng.</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            main.innerHTML = html;

            setTimeout(() => {
                const ctxCanvas = document.getElementById('mainChart');
                if(!ctxCanvas) return;
                const ctx = ctxCanvas.getContext('2d');
                
                Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
                Chart.defaults.color = '#64748b';

                if (currentTab === 'overview') {
                    activeChartObj = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.chartData.labels,
                            datasets: [{
                                label: 'Quy mô (Tỷ VNĐ)',
                                data: data.chartData.values,
                                borderColor: meta.color,
                                backgroundColor: meta.color + '20',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4,
                                pointBackgroundColor: '#fff',
                                pointBorderColor: meta.color,
                                pointBorderWidth: 2,
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false }, tooltip: { padding: 12, cornerRadius: 8 } },
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { dash: [4, 4] } },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                } else if (currentTab === 'strategy') {
                    const palettes = {
                        livestream: ['#ea580c', '#f97316', '#fb923c', '#fdba74', '#10b981'],
                        cowork: ['#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#10b981']
                    };
                    activeChartObj = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: data.economicsData.labels,
                            datasets: [{
                                data: data.economicsData.values,
                                backgroundColor: palettes[currentInd],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false, cutout: '65%',
                            plugins: {
                                legend: { position: 'right', labels: { boxWidth: 12, font: { size: 12 } } },
                                tooltip: { callbacks: { label: (c) => ` ${c.label}: ${c.raw}%` }, padding: 12 }
                            }
                        }
                    });
                }
            }, 100);
        }
    </script>
</body>
</html>
