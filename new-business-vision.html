<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Chiến Lược: Thị Trường Nha Khoa Thẩm Mỹ & Dental Tourism - My Auris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Chosen Palette: Warm Professional (Beige background, Deep Teal/Navy for text/accents, Soft Gold/Coral for highlights) -->
    <!-- Application Structure Plan: A dashboard-style SPA with a persistent side/top navigation. This structure allows the executive board to quickly jump to specific areas of interest (e.g., just looking at 'Markets' or 'Strategy') without scrolling through a massive document. It groups information logically: Overview -> The "Who" & "Where" (Markets/Customers) -> The "What" (Services) -> The "How" (Strategy). -->
    <!-- Visualization & Content Choices: 
         1. Cost Comparison -> Bar Chart (Goal: Compare, Library: Chart.js Canvas) - Highlights the primary trigger for Dental Tourism.
         2. Target Demographics -> Doughnut Chart (Goal: Proportions, Library: Chart.js Canvas) - Shows where to focus marketing spend.
         3. Action Priority Matrix -> CSS Grid Matrix (Goal: Organize/Prioritize) - Visual tool for management decision making.
         4. Service Potential -> Radar Chart (Goal: Comparison across multiple variables, Library: Chart.js) - Evaluates services based on margin, demand, and feasibility for tourists.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F7F4; /* Light beige/warm neutral */
            color: #1E293B; /* Slate 800 */
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }

        @media (min-width: 768px) {
            .chart-container { height: 400px; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .nav-item.active {
            background-color: #0F766E; /* Teal 700 */
            color: white;
            font-weight: 600;
        }
        
        .nav-item { transition: all 0.2s ease; }
        .nav-item:hover:not(.active) { background-color: #E2E8F0; }

        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

        <div class="p-4 border-t border-gray-100 text-xs text-gray-400 hidden md:block">

    <!-- Main Content Area -->

    </main>

        function renderTargetMarkets() {

                currentChart = new Chart(ctxBar, {
                    type: 'bar',
                    data: reportData.costComparison,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: { display: true, text: 'So sánh Chi phí Trung bình (USD) - Căn nguyên của Dental Tourism' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        scales: { y: { beginAtZero: true, title: { display: true, text: 'USD' } } }
                    }
                });

                const ctxPie = document.getElementById('demoChart').getContext('2d');
                new Chart(ctxPie, {
                    type: 'doughnut',
                    data: reportData.demographics,
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { title: { display: true, text: 'Tỷ trọng Ngân sách Marketing Đề xuất theo Khu vực' } }

        // --- NAVIGATION & STATE MANAGEMENT ---
        function navigate(tabId) {
            // Update active styling
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeBtn = document.querySelector(`button[onclick="navigate('${tabId}')"]`);
            if(activeBtn) activeBtn.classList.add('active');

            // Render content
            const contentDiv = document.getElementById('main-content');
            
            // Clean up charts before unmounting DOM
            if(currentChart) {
                currentChart.destroy();
                currentChart = null;
            }

            // Hide mobile menu on click
            document.getElementById('nav-links').classList.add('hidden');
            document.getElementById('nav-links').classList.remove('flex');

            switch(tabId) {
                case 'exec-summary': contentDiv.innerHTML = renderExecutiveSummary(); break;
                case 'market-trends': contentDiv.innerHTML = renderMarketTrends(); break;
                case 'target-markets': contentDiv.innerHTML = renderTargetMarkets(); break;
                case 'consumer-behavior': contentDiv.innerHTML = renderConsumerBehavior(); break;
                case 'service-analysis': contentDiv.innerHTML = renderServiceAnalysis(); break;
                case 'strategy': contentDiv.innerHTML = renderStrategy(); break;
                default: contentDiv.innerHTML = renderExecutiveSummary();
            }

            // Scroll to top
            contentDiv.scrollTop = 0;
        }

        // Mobile menu toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            const navLinks = document.getElementById('nav-links');
            if (navLinks.classList.contains('hidden')) {
                navLinks.classList.remove('hidden');
                navLinks.classList.add('flex');
            } else {
                navLinks.classList.add('hidden');
                navLinks.classList.remove('flex');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            navigate('exec-summary');
        });

    </script>
